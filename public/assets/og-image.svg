<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B8B8E"/>
      <stop offset="48%" stop-color="#6B6B6E"/>
      <stop offset="100%" stop-color="#3A3A3C"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 120) rotate(38) scale(540 280)">
      <stop stop-color="#60A5FA" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 560) rotate(-132) scale(520 260)">
      <stop stop-color="#F59E0B" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <rect x="0" y="0" width="1200" height="42" fill="rgba(255,255,255,0.82)"/>
  <circle cx="28" cy="21" r="7" fill="#111827"/>
  <text x="52" y="27" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Benjamin Adedowole</text>
  <text x="1008" y="27" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600">AI/ML • Cybersecurity</text>

  <g filter="url(#shadow)">
    <rect x="90" y="84" width="660" height="392" rx="18" fill="#F5F5F7"/>
    <rect x="90" y="84" width="660" height="44" rx="18" fill="#E8E8ED"/>
    <rect x="90" y="114" width="660" height="14" fill="#E8E8ED"/>
    <circle cx="118" cy="106" r="7" fill="#FF5F57"/>
    <circle cx="141" cy="106" r="7" fill="#FEBC2E"/>
    <circle cx="164" cy="106" r="7" fill="#28C840"/>
    <text x="354" y="112" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">About Me</text>

    <text x="132" y="186" fill="#003399" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="800">Benjamin Adedowole</text>
    <text x="132" y="226" fill="#0066CC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700">AI/ML and Cybersecurity Student</text>
    <text x="132" y="262" fill="#333333" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600">Dakota State University • Software Engineering • CTFs • Computer Vision</text>

    <rect x="132" y="302" width="556" height="118" rx="14" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="158" y="343" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="800">macOS-inspired portfolio</text>
    <text x="158" y="378" fill="#3A3A3C" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Projects, experience, achievements, certifications,</text>
    <text x="158" y="405" fill="#3A3A3C" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">and cybersecurity competition work.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="812" y="128" width="260" height="168" rx="18" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.38)"/>
    <text x="840" y="176" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800">Featured work</text>
    <text x="840" y="214" fill="rgba(255,255,255,0.86)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">PyPikachu</text>
    <text x="840" y="246" fill="rgba(255,255,255,0.86)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Clash of Prodigies</text>
    <text x="840" y="278" fill="rgba(255,255,255,0.86)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Danger Dash</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="816" y="340" width="250" height="112" rx="18" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.38)"/>
    <text x="844" y="386" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800">Competition focus</text>
    <text x="844" y="424" fill="rgba(255,255,255,0.86)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">CTFs • Cyber Defense</text>
  </g>

  <rect x="402" y="524" width="396" height="70" rx="28" fill="url(#dock)" stroke="rgba(255,255,255,0.42)" filter="url(#softShadow)"/>
  <circle cx="466" cy="559" r="24" fill="#2695EE"/>
  <circle cx="534" cy="559" r="24" fill="#34C759"/>
  <circle cx="602" cy="559" r="24" fill="#AF52DE"/>
  <circle cx="670" cy="559" r="24" fill="#E8B86D"/>
  <circle cx="738" cy="559" r="24" fill="#F59E0B"/>
</svg>
